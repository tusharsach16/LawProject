version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

  backend-signaling:
    build: ./backend-signaling
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./backend-signaling/.env
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
        VITE_SIGNALING_WS_URL: ws://localhost:8080
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - backend-signaling
