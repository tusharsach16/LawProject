version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: tushar1610/nyaysetu-backend:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

  backend-signaling:
    image: tushar1610/nyaysetu-signaling:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./backend-signaling/.env
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

  frontend:
    image: tushar1610/nyaysetu-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - backend-signaling
